name: Client Build (Windows EXE)

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'shared/**'
  pull_request:
    paths:
      - 'client/**'
      - 'shared/**'

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client/web

      - name: Build Vue frontend
        run: npm run build
        working-directory: client/web

      - name: Build EXE with PyInstaller
        run: python client/build/build.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AHDUNYI_Terminal_PRO_${{ github.sha }}
          path: dist/AHDUNYI_Terminal_PRO/
          retention-days: 30
